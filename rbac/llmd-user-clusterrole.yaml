apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: llmd-user
  labels:
    llmd.io/role: user
rules:
  # Cluster-scoped: namespace management
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "delete", "update", "patch"]

  # Cluster-scoped: read-only node access (check GPU resources, topology)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]

  # Cluster-scoped: read-only persistent volumes
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch"]

  # Core workload resources
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/exec
      - pods/portforward
      - pods/attach
      - services
      - configmaps
      - secrets
      - serviceaccounts
      - persistentvolumeclaims
      - events
      - endpoints
      - replicationcontrollers
    verbs: ["*"]

  # Apps
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
    verbs: ["*"]

  # Batch
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["*"]

  # Networking
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["*"]

  # Autoscaling
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["*"]

  # Policy
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["*"]

  # RBAC: namespace-scoped and cluster-scoped
  # ClusterRoles/Bindings needed because llm-d Helm charts create cluster-scoped
  # RBAC for the EPP (e.g., gaie-pd-<ns>-epp ClusterRole)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["*"]

  # Prometheus monitoring CRDs
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["podmonitors", "servicemonitors", "prometheusrules"]
    verbs: ["*"]

  # Gateway API (for llm-d inference routing)
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "httproutes", "referencegrants"]
    verbs: ["*"]

  # Inference extension CRDs (for llm-d endpoint picker)
  - apiGroups: ["inference.networking.x-k8s.io", "inference.networking.k8s.io"]
    resources: ["inferencemodels", "inferencepools"]
    verbs: ["*"]

  # AgentGateway CRDs (llm-d gateway provider)
  - apiGroups: ["agentgateway.dev"]
    resources: ["agentgatewayparameters", "agentgatewaybackends", "agentgatewaypolicies"]
    verbs: ["*"]

  # LeaderWorkerSet (for wide-EP / multi-node LWS deployments)
  - apiGroups: ["leaderworkerset.x-k8s.io"]
    resources: ["leaderworkersets"]
    verbs: ["*"]

  # CRDs: llm-d prereq scripts install Gateway API and GAIE CRDs
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["*"]

  # Admission policies: Gateway API CRDs include ValidatingAdmissionPolicies
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["validatingadmissionpolicies", "validatingadmissionpolicybindings"]
    verbs: ["*"]

  # Leases (debugging, leader election visibility)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch"]

  # Storage classes (read-only)
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
