apiVersion: mellanox.com/v1alpha1
kind: NicClusterPolicy
metadata:
  name: nic-cluster-policy
spec:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: feature.node.kubernetes.io/rdma-infiniband.capable
              operator: In
              values:
                - "true"

  ofedDriver:
    repository: nvcr.io/nvidia/mellanox
    image: doca-driver
    version: doca3.2.0-25.10-1.2.8.0-2
    env:
      - name: OFED_BLACKLIST_MODULES_FILE
        value: "/host/etc/modprobe.d/blacklist-ofed-modules.conf"
    forcePrecompiled: false
    upgradePolicy:
      autoUpgrade: true
      drain:
        deleteEmptyDir: true
        enable: true
        force: true
        timeoutSeconds: 300
      maxParallelUpgrades: 1
    startupProbe:
      initialDelaySeconds: 10
      periodSeconds: 20
    livenessProbe:
      initialDelaySeconds: 30
      periodSeconds: 30
    readinessProbe:
      initialDelaySeconds: 10
      periodSeconds: 30

  docaTelemetryService:
    repository: nvcr.io/nvidia/doca
    image: doca_telemetry
    version: 1.22.5-doca3.1.0-host

  sriovDevicePlugin:
    repository: nvcr.io/nvidia/mellanox
    image: sriov-network-device-plugin
    version: network-operator-v25.10.0
    config: |
      {
        "resourceList": [
          {
            "resourcePrefix": "rdma",
            "resourceName": "ib",
            "selectors": {
              "vendors": ["15b3"],
              "linkTypes": ["infiniband"],
              "isRdma": true
            }
          }
        ]
      }
