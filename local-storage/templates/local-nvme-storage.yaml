apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: local-nvme-storage
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: local-nvme-storage
  template:
    metadata:
      labels:
        app: local-nvme-storage
    spec:
      nodeSelector:
{{- toYaml .Values.nodeSelector | nindent 8 }}
{{- if .Values.tolerations }}
      tolerations:
{{- toYaml .Values.tolerations | nindent 8 }}
{{- end }}
      hostPID: true
      hostNetwork: true
      containers:
        - name: init-local-nvme-storage
          image: ubuntu:22.04
          securityContext:
            privileged: true
          command:
            - /bin/bash
            - -c
            - |
              set -e
              MOUNT_PATH="{{ .Values.mountPath }}"

              # If RAID is already assembled and mounted correctly, nothing to do
              if [ -b /dev/md0 ] && findmnt -rno TARGET /dev/md0 | grep -qx "$MOUNT_PATH"; then
                echo "RAID already mounted at $MOUNT_PATH, sleeping..."
                sleep infinity
              fi

              apt-get update -qq && apt-get install -y -qq mdadm nvme-cli xfsprogs > /dev/null

              NVME_DEVS=$(lsblk -dn -o NAME,TYPE | awk '$2=="disk" && /nvme/ {print "/dev/"$1}')
              DEV_COUNT=$(echo "$NVME_DEVS" | wc -w)

              if [ "$DEV_COUNT" -eq 0 ]; then
                echo "No NVMe devices found, sleeping..."
                sleep infinity
              fi

              # Try to assemble an existing array (drives may have RAID superblocks from a previous run)
              if ! [ -b /dev/md0 ]; then
                if mdadm --examine "$( echo $NVME_DEVS | awk '{print $1}' )" 2>/dev/null | grep -q "Raid Level"; then
                  echo "Found existing RAID superblocks, assembling..."
                  mdadm --assemble /dev/md0 $NVME_DEVS
                else
                  echo "Creating new RAID-0 from $DEV_COUNT NVMe devices..."
                  mdadm --create /dev/md0 --level=0 --raid-devices=$DEV_COUNT $NVME_DEVS --force --run
                  mkfs.xfs /dev/md0
                fi
              fi

              mkdir -p "$MOUNT_PATH"
              if ! mount /dev/md0 "$MOUNT_PATH" 2>/dev/null; then
                echo "Mount failed (possibly corrupted filesystem), reformatting..."
                mkfs.xfs -f /dev/md0
                mount /dev/md0 "$MOUNT_PATH"
              fi
              mkdir -p "$MOUNT_PATH/models"
              chmod 777 "$MOUNT_PATH/models"

              echo "RAID-0 mounted at $MOUNT_PATH ($DEV_COUNT NVMe drives, ~$(lsblk -dn -o SIZE /dev/md0) total)"
              sleep infinity
          volumeMounts:
            - name: host-dev
              mountPath: /dev
            - name: host-mnt
              mountPath: "{{ .Values.mountPath }}"
              mountPropagation: Bidirectional
      volumes:
        - name: host-dev
          hostPath:
            path: /dev
        - name: host-mnt
          hostPath:
            path: "{{ .Values.mountPath }}"
            type: DirectoryOrCreate